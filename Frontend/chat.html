<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
   <!-- Logo (Favicon) -->
  <link rel="icon" type="image/png" href="images/Logos.png">

  <title>ChatBoot | SkillPath AI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-theme="dark">
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div>
        <div class="logo">
          <div class="mark">AI</div>
          <div>
            <div style="font-weight:700">AI Assistant</div>
            <div class="muted" style="font-size:12px">chat & creative tools</div>
          </div>
        </div>

        <nav class="nav" style="margin-top:18px">
  <a href="#" class="active">
    <i class="fas fa-home" style="margin-right:8px;"></i> <!-- Home icon -->
     Home
  </a>
  <a href="#">
    <i class="fas fa-history" style="margin-right:8px;"></i> <!-- History icon -->
     Chat History
  </a>
  <a href="#">
    <i class="fas fa-cog" style="margin-right:8px;"></i> <!-- Settings icon -->
     Settings
  </a>
</nav>

      </div>

      <div style="display:flex;flex-direction:column;gap:12px">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div class="profile">
            <div class="avatar">JS</div>
            <div>
              <div style="font-weight:600">Janvi Soni</div>
              <div class="muted" style="font-size:12px">Pro user</div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            <label class="muted" style="font-size:12px">Theme</label>
            <input type="checkbox" id="themeToggle" aria-label="Toggle theme">
          </div>
        </div>
        <div style="font-size:12px;color:var(--muted);">v1.0 • Built for demos</div>
      </div>
    </aside>

    <main class="main">
  <header class="header">
    <div class="center">
      <div class="hamburger" id="hamburger" title="Open menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="title">AI Assistant</div>
    </div>

    <div style="display:flex;align-items:center;gap:14px">
      <div class="muted">Logged in</div>
      <div class="avatar" style="width:36px;height:36px;border-radius:8px">JS</div>
    </div>
  </header>

  <section class="chat-window" aria-label="Chat area" style="height:calc(100vh - 80px); display:flex; flex-direction:column;">
    <div class="messages" id="messages" role="list" style="flex:1; overflow-y:auto; padding:12px;">
      <!-- messages will be injected here -->
    </div>

    <div class="composer" style="margin-top:8px; display:flex; gap:8px;">
      <div class="input" style="flex:1;">
        <textarea id="input" placeholder="Type a message... (Shift+Enter for new line)" style="width:100%; height:60px; resize:none;"></textarea>
      </div>
      <button class="send" id="sendBtn" title="Send message" style="display:flex; align-items:center; gap:6px; padding:10px 16px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="transform:rotate(45deg)">
          <path d="M22 2L11 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
        <span style="font-weight:600">Send</span>
      </button>
    </div>

    <div class="help" style="margin-top:6px;">Tip: Use the theme toggle in the sidebar to switch light/dark modes.</div>
  </section>
</main>

  <script src="assets/js/main.js"></script>
</body>
</html>
